name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un sol desplegament actiu; no cancel·la el que ja corre.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # El backend de Pages retorna sovint "Deployment failed, try again
      # later." al primer intent (error transitori, no del build). Reintentem
      # automàticament fins a 3 cops perquè no calgui re-desplegar a mà.
      - id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - if: steps.deploy1.outcome == 'failure'
        run: sleep 15

      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30

      # Tercer intent: aquest SI fa fallar el job si tambe falla.
      - id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
