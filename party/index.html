<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Party · Belgrado Sant Cugat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="center">
  <main class="poll">
    <p class="eyebrow">Lab Module for navify Integrator · Sant Cugat</p>
    <h1>Are you coming to the <span>Belgrado</span> party? 🎉</h1>
    <p class="subtitle">After the PI Planning. One quick tap — it's anonymous.</p>

    <div class="vote-buttons">
      <button class="vote yes" id="voteYes">
        <span class="vote-emoji">✅</span>
        <span class="vote-label">I'm coming</span>
        <span class="vote-count" id="countYes">0</span>
      </button>
      <button class="vote no" id="voteNo">
        <span class="vote-emoji">❌</span>
        <span class="vote-label">Can't make it</span>
        <span class="vote-count" id="countNo">0</span>
      </button>
    </div>

    <div class="bar" aria-hidden="true">
      <div class="bar-yes" id="barYes"></div>
    </div>
    <p class="total" id="total">No votes yet</p>

    <p class="mode-note" id="modeNote"></p>
  </main>

  <script src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
