<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>CB Sant Josep de Badalona · Reserva de disponibilitat</title>
  <style>
    :root {
      --bg:#160f26; --card:#241836; --card-hover:#2e1f44; --text:#ece8f5;
      --muted:#94a3b8; --accent:#a855f7; --border:#3b2f4d;
      --lila:#a855f7; --groc:#facc15;
      --danger:#f87171; --warn:#facc15; --ok:#c084fc;
      --on:#16a34a; --on-bg:#14331f;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg); color:var(--text); padding:24px; line-height:1.5; }
    header { margin-bottom:20px; display:flex; align-items:center; gap:16px;
      border-left:6px solid var(--groc); padding-left:14px; }
    header .logo { height:64px; width:auto; border-radius:8px; flex-shrink:0;
      background:#fff; padding:4px; }
    header .htext h1 { font-size:1.5rem; font-weight:800; color:var(--text); }
    header .htext h1 .club { color:var(--groc); }
    header .htext p { color:var(--muted); font-size:0.9rem; margin-top:4px; }

    .toolbar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:18px; }
    .toolbar input, .toolbar select { background:var(--card); border:1px solid var(--border); color:var(--text);
      padding:9px 12px; border-radius:8px; font-size:0.9rem; }
    .toolbar input#coachName { min-width:240px; }
    .toolbar input#coachName::placeholder { color:var(--muted); }
    .toolbar .sep { flex:1; }
    .toolbar button.navlink { background:transparent; cursor:pointer; color:var(--accent);
      text-decoration:none; font-size:0.88rem; border:1px solid var(--border);
      border-radius:8px; padding:9px 14px; }
    .toolbar button.navlink:hover { color:var(--groc); border-color:var(--groc); }
    .toolbar button.primary { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
    .toolbar button.primary:hover { background:#9333ea; color:#fff; }
    .toolbar button:disabled { opacity:0.45; cursor:not-allowed; }
    .status { color:var(--muted); font-size:0.8rem; }

    h2.section { font-size:1.1rem; font-weight:600; margin:8px 0 6px; }
    p.hint { color:var(--muted); font-size:0.82rem; margin-bottom:14px; }

    .gate { background:var(--card); border:1px solid var(--border); border-radius:12px;
      padding:22px; margin-bottom:20px; text-align:center; }
    .gate p { color:var(--muted); font-size:0.9rem; }

    .week-block { background:var(--card); border:1px solid var(--border);
      border-radius:12px; padding:18px; margin-bottom:20px; }
    .week-head { display:flex; align-items:baseline; gap:10px; margin-bottom:14px;
      border-bottom:1px solid var(--border); padding-bottom:10px; }
    .week-head .wk { font-size:1.1rem; font-weight:700; }
    .week-head .rng { color:var(--muted); font-size:0.82rem; margin-left:auto; }
    .week-head .frozen { color:var(--groc); font-size:0.75rem; font-weight:600;
      border:1px solid var(--border); border-radius:999px; padding:2px 10px; }

    table.grid { border-collapse:collapse; width:100%; font-size:0.82rem; }
    table.grid th, table.grid td { border:1px solid var(--border); padding:0; text-align:center; }
    table.grid thead th { background:var(--bg); color:var(--muted); font-weight:600;
      padding:8px 6px; white-space:nowrap; }
    table.grid td.daycell { text-align:left; color:var(--text); font-weight:600;
      padding:8px 10px; white-space:nowrap; background:var(--bg); }
    table.grid td.daycell small { display:block; color:var(--muted); font-weight:400; }
    .cell { display:block; width:100%; height:100%; min-height:46px; cursor:pointer;
      background:transparent; border:none; color:var(--muted); font-size:0.8rem;
      transition:background 0.12s, color 0.12s; }
    .cell:hover { background:var(--card-hover); }
    .cell.on { background:var(--on-bg); color:#86efac; font-weight:700; }
    .cell.on::after { content:"✓"; }
    .cell.off::after { content:""; }
    .cell.frozen { cursor:not-allowed; opacity:0.4; }
    .cell.frozen:hover { background:transparent; }

    .legend { display:flex; gap:16px; flex-wrap:wrap; margin:6px 0 16px; font-size:0.8rem; color:var(--muted); }
    .legend span { display:inline-flex; align-items:center; gap:6px; }
    .legend .box { width:16px; height:16px; border-radius:4px; border:1px solid var(--border); display:inline-block; }
    .legend .box.on { background:var(--on-bg); }
    .legend .box.off { background:transparent; }

    .summary { background:var(--card); border:1px solid var(--border); border-radius:12px;
      padding:14px 18px; margin-bottom:20px; font-size:0.9rem; }
    .summary strong { color:var(--groc); }
    .empty { text-align:center; color:var(--muted); padding:30px; }
    footer { margin-top:30px; color:var(--muted); font-size:0.8rem; text-align:center; }
  </style>
</head>
<body>
  <header>
    <img class="logo" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt="Escut CB Sant Josep de Badalona" />
    <div class="htext">
      <h1><span class="club">CB Sant Josep de Badalona</span> · Reserva de disponibilitat</h1>
      <p>Marca les franges en què pots entrenar durant el juliol. Es desa automàticament.</p>
    </div>
  </header>

  <div class="toolbar">
    <input id="coachName" type="text" placeholder="Escriu el teu nom i cognom…" autocomplete="off" />
    <button id="loadBtn" class="primary" type="button">Entrar</button>
    <button id="changeBtn" class="navlink" type="button" style="display:none;">Canviar de nom</button>
    <span class="sep"></span>
    <span class="status" id="status"></span>
  </div>

  <div class="gate" id="gate">
    <p>Escriu el teu nom a dalt i prem <strong>Entrar</strong> per marcar la teva disponibilitat.</p>
  </div>

  <div id="app" style="display:none;">
    <div class="summary" id="summary"></div>
    <div class="legend">
      <span><span class="box on"></span> Disponible (clica per treure)</span>
      <span><span class="box off"></span> No disponible (clica per marcar)</span>
    </div>
    <div id="weeks"></div>
  </div>

  <footer id="footer"></footer>

  <script>
    // ===== Configuració compartida amb el dashboard =====
    const SLOTS = ["18:00","19:00","20:00","21:00"];
    const SLOT_LABEL = { "18:00":"18-19h","19:00":"19-20h","20:00":"20-21h","21:00":"21-22h" };
    const WEEKDAYS = ["Diumenge","Dilluns","Dimarts","Dimecres","Dijous","Divendres","Dissabte"];

    const WEEK_COLUMNS = [
      { days:["07/01/2026","07/02/2026","07/03/2026"], label:"Setmana 1", rng:"De l'1 al 3 de juliol" },
      { days:["07/06/2026","07/07/2026","07/08/2026","07/09/2026","07/10/2026"], label:"Setmana 2", rng:"Del 6 al 10 de juliol" },
      { days:["07/13/2026","07/14/2026","07/15/2026","07/16/2026","07/17/2026"], label:"Setmana 3", rng:"Del 13 al 17 de juliol" },
      { days:["07/20/2026","07/21/2026","07/22/2026","07/23/2026","07/24/2026"], label:"Setmana 4", rng:"Del 20 al 24 de juliol" },
      { days:["07/27/2026","07/28/2026","07/29/2026","07/30/2026","07/31/2026"], label:"Setmana 5", rng:"Del 27 al 31 de juliol" },
    ];

    // Setmana 1 congelada: només consulta (com al dashboard).
    const FROZEN_WEEK = "Setmana 1";
    const isWeekFrozen = (w)=> w===FROZEN_WEEK;

    function isoFromMdy(mdy){ const [m,d,y]=mdy.split("/"); return `${y}-${m}-${d}`; }
    function weekdayOf(iso){ const [y,m,d]=iso.split("-").map(Number); return WEEKDAYS[new Date(Date.UTC(y,m-1,d)).getUTCDay()]; }
    function dispFromIso(iso){ const [y,m,d]=iso.split("-"); return `${d}/${m}`; }

    // ===== Firebase (REST, sense token) =====
    // Node NOU, independent de coachAssignments i sessionNotes. Cada coach té
    // el seu subnode → dos coaches no es trepitgen. Estructura:
    //   coachAvailability/{coachKey} = { name, _ts, slots:{ "dateISO|slot":true } }
    const FIREBASE_DB_URL = "https://tecni-notes-default-rtdb.europe-west1.firebasedatabase.app";
    const FIREBASE_AVAIL_PATH = "coachAvailability";
    const hasFirebase = ()=> !!FIREBASE_DB_URL;
    function coachKey(name){
      // Firebase no admet . # $ [ ] / a les claus.
      return name.trim().replace(/\s+/g," ").replace(/[.#$\[\]\/]/g,"_");
    }
    function availUrl(key){
      const base=FIREBASE_DB_URL.replace(/\/$/,"");
      return key ? `${base}/${FIREBASE_AVAIL_PATH}/${encodeURIComponent(key)}.json`
                 : `${base}/${FIREBASE_AVAIL_PATH}.json`;
    }

    // ===== Estat =====
    let coach = "";           // nom visible
    let key = "";             // clau Firebase
    let slots = {};           // { "dateISO|slot": true }
    let saveTimer = null;
    const DIRTY = new Set();  // claus modificades pendents de desar

    const $ = (id)=> document.getElementById(id);
    function setStatus(t){ $("status").textContent=t||""; }

    async function loadCoach(){
      const raw=$("coachName").value.trim().replace(/\s+/g," ");
      if(raw.length<3){ setStatus("Escriu el teu nom complet."); return; }
      coach=raw; key=coachKey(raw);
      setStatus("Carregant la teva disponibilitat…");
      slots={};
      if(hasFirebase()){
        try{
          const res=await fetch(`${availUrl(key)}?t=${Date.now()}`,{ cache:"no-store" });
          if(res.ok){
            const data=await res.json();
            if(data && data.slots && typeof data.slots==="object") slots={...data.slots};
          }
        }catch(e){ setStatus("No s'ha pogut carregar: "+e.message); }
      }
      try{ localStorage.setItem("reserves-lastname", coach); }catch(e){}
      $("gate").style.display="none";
      $("app").style.display="";
      $("changeBtn").style.display="";
      $("coachName").disabled=true;
      $("loadBtn").style.display="none";
      render();
      setStatus("Hola, "+coach+" · els canvis es desen automàticament.");
    }

    function changeCoach(){
      $("coachName").disabled=false;
      $("loadBtn").style.display="";
      $("changeBtn").style.display="none";
      $("app").style.display="none";
      $("gate").style.display="";
      $("coachName").focus();
      setStatus("");
    }

    function toggle(cellKey, week){
      if(isWeekFrozen(week)) return;
      if(slots[cellKey]) delete slots[cellKey];
      else slots[cellKey]=true;
      DIRTY.add(cellKey);
      render();
      scheduleSave();
    }

    function scheduleSave(){
      if(!hasFirebase()){ setStatus("⚠️ Sense connexió: els canvis no es comparteixen."); return; }
      clearTimeout(saveTimer);
      setStatus("Desant…");
      saveTimer=setTimeout(save, 800);
    }

    async function save(){
      // Escriu tot el subnode del coach (PUT): és petit i evita conflictes de
      // claus esborrades. Cada coach té el seu subnode, així no trepitja ningú.
      try{
        const payload={ name:coach, _ts:Date.now(), slots };
        const res=await fetch(availUrl(key),{
          method:"PUT",
          headers:{ "Content-Type":"application/json" },
          body:JSON.stringify(payload),
        });
        if(!res.ok) throw new Error("HTTP "+res.status);
        DIRTY.clear();
        setStatus("✅ Desat · "+new Date().toLocaleTimeString("ca-ES"));
      }catch(e){
        setStatus("❌ No s'ha pogut desar: "+e.message);
      }
    }

    function countTotal(){ return Object.keys(slots).filter(k=>slots[k]).length; }

    function render(){
      const weeksEl=$("weeks");
      let html="";
      WEEK_COLUMNS.forEach(wc=>{
        const frozen=isWeekFrozen(wc.label);
        html+=`<div class="week-block">
          <div class="week-head">
            <span class="wk">${wc.label}</span>
            ${frozen?'<span class="frozen">🔒 congelada · només consulta</span>':""}
            <span class="rng">${wc.rng}</span>
          </div>
          <table class="grid"><thead><tr><th>Dia</th>`;
        SLOTS.forEach(sl=> html+=`<th>${SLOT_LABEL[sl]}</th>`);
        html+="</tr></thead><tbody>";
        wc.days.forEach(mdy=>{
          const iso=isoFromMdy(mdy);
          html+=`<tr><td class="daycell">${weekdayOf(iso)}<small>${dispFromIso(iso)}</small></td>`;
          SLOTS.forEach(sl=>{
            const ck=iso+"|"+sl;
            const on=!!slots[ck];
            const cls="cell "+(on?"on":"off")+(frozen?" frozen":"");
            html+=`<td><button type="button" class="${cls}" data-ck="${ck}" data-wk="${wc.label}" aria-pressed="${on}"></button></td>`;
          });
          html+="</tr>";
        });
        html+="</tbody></table></div>";
      });
      weeksEl.innerHTML=html;
      weeksEl.querySelectorAll(".cell").forEach(btn=>{
        btn.addEventListener("click",()=>toggle(btn.dataset.ck, btn.dataset.wk));
      });
      // Resum
      const total=countTotal();
      $("summary").innerHTML=`Tens <strong>${total}</strong> franges marcades `+
        `(la Setmana 1 està congelada i no es pot editar).`;
    }

    // ===== Init =====
    $("loadBtn").addEventListener("click", loadCoach);
    $("changeBtn").addEventListener("click", changeCoach);
    $("coachName").addEventListener("keydown", e=>{ if(e.key==="Enter") loadCoach(); });
    try{
      const last=localStorage.getItem("reserves-lastname");
      if(last) $("coachName").value=last;
    }catch(e){}
    $("footer").textContent="CB Sant Josep de Badalona · Tecnificacions juliol 2026";
  </script>
</body>
</html>
